<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alpha · 资源导航</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 48px 20px 60px;
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
  }

  .container {
    width: 100%;
    max-width: 420px;
    text-align: center;
  }

  /* Logo */
  .logo {
    font-family: 'Inter', 'SF Pro Display', 'Helvetica Neue', sans-serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 10px;
    color: #ffffff;
    margin-bottom: 4px;
  }

  .divider-dot {
    width: 3px;
    height: 3px;
    background: #ffffff44;
    border-radius: 50%;
    margin: 12px auto 14px;
  }

  .tagline {
    font-size: 13px;
    color: #555;
    margin-bottom: 36px;
    letter-spacing: 2px;
    line-height: 1.7;
  }

  /* 链接 */
  .links {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: #111;
    border: 1px solid #1a1a1a;
    border-radius: 10px;
    padding: 15px 18px;
    text-decoration: none;
    transition: all 0.25s;
  }
  .link-card:hover {
    border-color: #ffffff33;
    background: #161616;
  }

  .link-icon {
    font-size: 20px;
    flex-shrink: 0;
    width: 32px;
    text-align: center;
  }
  .link-text {
    flex: 1;
    text-align: left;
  }
  .link-title {
    font-size: 14px;
    font-weight: 600;
    color: #ddd;
  }
  .link-desc {
    font-size: 11px;
    color: #555;
    margin-top: 1px;
  }
  .link-arrow {
    color: #333;
    font-size: 14px;
  }

  /* 高亮 */
  .link-card.featured {
    border-color: #ffffff15;
  }

  /* 免费标签 */
  .tag-free {
    display: inline-block;
    font-size: 10px;
    color: #666;
    border: 1px solid #333;
    padding: 0 6px;
    border-radius: 6px;
    margin-left: 4px;
    letter-spacing: 1px;
  }

  /* 微信卡片 */
  .link-card.wechat {
    border-color: #1a1a1a;
  }

  /* 底部 */
  .socials {
    display: flex;
    justify-content: center;
    gap: 24px;
    margin-top: 36px;
    padding-top: 28px;
    border-top: 1px solid #111;
  }
  .social-link {
    font-size: 20px;
    text-decoration: none;
    opacity: 0.3;
    transition: opacity 0.2s;
  }
  .social-link:hover { opacity: 0.7; }

  .footer {
    margin-top: 28px;
    font-size: 11px;
    color: #222;
    letter-spacing: 1px;
  }
</style>
</head>
<body>
<div class="container">

  <div class="logo">ALPHA</div>
  <div class="divider-dot"></div>
  <div class="tagline">
    AI 编程实战教程<br>
    Claude Code 中文指南
  </div>

  <div class="links">

    <a href="#" class="link-card featured">
      <span class="link-icon">▶️</span>
      <span class="link-text">
        <span class="link-title">YouTube</span>
        <span class="link-desc">每周更新 AI 编程实战</span>
      </span>
      <span class="link-arrow">→</span>
    </a>

    <a href="#" class="link-card">
      <span class="link-icon">𝕏</span>
      <span class="link-text">
        <span class="link-title">X / Twitter</span>
        <span class="link-desc">日常干货 · AI 资讯</span>
      </span>
      <span class="link-arrow">→</span>
    </a>

    <a href="#" class="link-card featured">
      <span class="link-icon">📦</span>
      <span class="link-text">
        <span class="link-title">免费 Prompt 模板<span class="tag-free">FREE</span></span>
        <span class="link-desc">10 条精选提示词，拷走即用</span>
      </span>
      <span class="link-arrow">→</span>
    </a>

    <a href="#" class="link-card">
      <span class="link-icon">🎯</span>
      <span class="link-text">
        <span class="link-title">Prompt 模板入门包</span>
        <span class="link-desc">20 条实战模板 · ¥19.9</span>
      </span>
      <span class="link-arrow">→</span>
    </a>

    <a href="#" class="link-card">
      <span class="link-icon">⚙️</span>
      <span class="link-text">
        <span class="link-title">CLAUDE.md 配置模板</span>
        <span class="link-desc">三套配置，拷走即用 · ¥29.9</span>
      </span>
      <span class="link-arrow">→</span>
    </a>

    <a href="#" class="link-card">
      <span class="link-icon">🗺️</span>
      <span class="link-text">
        <span class="link-title">AI 编程工具全景图</span>
        <span class="link-desc">20+ 工具对比 · ¥9.9</span>
      </span>
      <span class="link-arrow">→</span>
    </a>

    <a href="#" class="link-card wechat">
      <span class="link-icon">💬</span>
      <span class="link-text">
        <span class="link-title">加微信</span>
        <span class="link-desc">朋友圈每日 AI 技巧 · 1v1 咨询</span>
      </span>
      <span class="link-arrow">→</span>
    </a>

  </div>

  <div class="socials">
    <a href="#" class="social-link">▶️</a>
    <a href="#" class="social-link">𝕏</a>
    <a href="#" class="social-link">🐙</a>
    <a href="#" class="social-link">💬</a>
  </div>

  <div class="footer">ALPHA © 2025</div>

</div>
</body>
</html>
